<!DOCTYPE html>
<html lang="en">
<head>
    <title>Checkout & Shipping</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/checkout.css">
    </head>
<body>

    <header>
        <img src="logo.jpg" alt="OFF!® Products Logo">
        <nav>
            <ul>
                <li><a href="landing.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="account.html">Account</a></li>
            </ul>
        </nav>
    </header>

    <h1>Checkout</h1>

    <div class="checkout-wrapper">
        <main class="checkout-main">
            <section class="shipping">
                <h2>Shipping Address</h2>
                <form>
                    <fieldset>
                        <legend>Delivery Information</legend>
                        
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Street Address</label>
                            <input type="text" id="address" name="address" placeholder="123 Main Street" required>
                        </div>

                        <div class="form-group">
                            <label for="apartment">Apartment, Suite, Unit (Optional)</label>
                            <input type="text" id="apartment" name="apartment" placeholder="Apt 4B">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="municipality">City</label>
                                <input type="text" id="municipality" name="municipality" required>
                            </div>

                            <div class="form-group">
                                <label for="province">Province</label>
                                <input type="text" id="province" name="province" placeholder="e.g., Metro Manila" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="zip">Postal Code</label>
                                <input type="text" id="zip" name="zip" required>
                            </div>

                            <div class="form-group">
                                <label for="country">Country</label>
                                <select id="country" name="country" required>
                                    <option value="">Select Country</option>
                                    <option value="PH">Philippines</option>
                                    <option value="US">United States</option>
                                    <option value="CA">Canada</option>
                                    <option value="AU">Australia</option>
                                </select>
                            </div>
                        </div>
                    </fieldset>
                </form>
            </section>
        </main>
<aside>
            <section class="payment">
                <h2>Payment Method</h2>
                <form>
                    <div class="payment-options">
                        <div class="payment-option">
                            <label>
                                <input type="radio" name="payment" value="credit-card" required>
                                Credit Card
                            </label>
                        </div>

                        <div class="payment-option">
                            <label>
                                <input type="radio" name="payment" value="paypal">
                                PayPal
                            </label>
                        </div>

                        <div class="payment-option">
                            <label>
                                <input type="radio" name="payment" value="debit-card">
                                Debit Card
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Place Order</button>
                </form>
            </section>

        <aside>
            <h2>Order Summary</h2>
            <div class="order-item">
                <span>Subtotal</span>
                <span>₱500.00</span>
            </div>
            <div class="order-item">
                <span>Shipping</span>
                <span>₱50.00</span>
            </div>
            <div class="order-item">
                <span>Tax</span>
                <span>₱45.00</span>
            </div>
            <div class="order-total">
                <span>Total:</span>
                <span>₱595.00</span>
            </div>
        </aside>
    </div>

    <script src="solution.js"></script>
    
</body>
</html>
